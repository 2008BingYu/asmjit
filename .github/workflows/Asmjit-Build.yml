name: Build Asmjit for all Android architectures

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build for ${{ matrix.abi }}
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DASMJIT_BUILD_LIBRARY=ON \
            -DASMJIT_BUILD_TEST=OFF \
            -DASMJIT_BUILD_TOOLS=OFF
          make -j$(nproc)
          
          echo "=== all .a files ==="
          find . -name "*.a" -type f
          echo "==================="
          
          mkdir -p ${{ github.workspace }}/output
          
          # 复制 .a 文件
          find . -name "*.a" -exec cp {} ${{ github.workspace }}/output/${{ matrix.abi }}.a \;
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asmjit-${{ matrix.abi }}
          path: output/*.a
