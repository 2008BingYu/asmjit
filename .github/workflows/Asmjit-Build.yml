name: Build Asmjit for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: asmjit/asmjit
          ref: master

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build armeabi-v7a
        run: |
          mkdir build-v7a && cd build-v7a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DASMJIT_BUILD_X86=OFF \
            -DASMJIT_BUILD_ARM=ON \
            -DASMJIT_BUILD_HOST=OFF \
            -DASMJIT_BUILD_TEST=OFF \
            -DASMJIT_BUILD_TOOLS=OFF
          make -j$(nproc)
          cd ..

      - name: Build arm64-v8a
        run: |
          mkdir build-v8a && cd build-v8a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DASMJIT_BUILD_X86=OFF \
            -DASMJIT_BUILD_ARM=ON \
            -DASMJIT_BUILD_HOST=OFF \
            -DASMJIT_BUILD_TEST=OFF \
            -DASMJIT_BUILD_TOOLS=OFF
          make -j$(nproc)
          cd ..

      - name: Build x86
        run: |
          mkdir build-x86 && cd build-x86
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86 \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DASMJIT_BUILD_X86=ON \
            -DASMJIT_BUILD_ARM=OFF \
            -DASMJIT_BUILD_HOST=OFF \
            -DASMJIT_BUILD_TEST=OFF \
            -DASMJIT_BUILD_TOOLS=OFF
          make -j$(nproc)
          cd ..

      - name: Build x86_64
        run: |
          mkdir build-x86_64 && cd build-x86_64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DASMJIT_BUILD_X86=ON \
            -DASMJIT_BUILD_ARM=OFF \
            -DASMJIT_BUILD_HOST=OFF \
            -DASMJIT_BUILD_TEST=OFF \
            -DASMJIT_BUILD_TOOLS=OFF
          make -j$(nproc)
          cd ..

      - name: Prepare release package
        run: |
          mkdir -p asmjit-release/lib/armeabi-v7a
          mkdir -p asmjit-release/lib/arm64-v8a
          mkdir -p asmjit-release/lib/x86
          mkdir -p asmjit-release/lib/x86_64
          mkdir -p asmjit-release/include/asmjit
          
          # 直接从编译目录复制 .a 文件（正确路径）
          cp build-v7a/src/asmjit/libasmjit.a asmjit-release/lib/armeabi-v7a/
          cp build-v8a/src/asmjit/libasmjit.a asmjit-release/lib/arm64-v8a/
          cp build-x86/src/asmjit/libasmjit.a asmjit-release/lib/x86/
          cp build-x86_64/src/asmjit/libasmjit.a asmjit-release/lib/x86_64/
          
          # 从源码复制头文件
          cp -r src/asmjit asmjit-release/include/

      - uses: actions/upload-artifact@v4
        with:
          name: asmjit-android-all
          path: asmjit-release/
