name: Build Asmjit Static Library for Android (All in One)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build for all architectures
        run: |
          # 创建最终输出目录
          mkdir -p release/include
          
          # 复制头文件（只需一次）
          cp -r asmjit release/include/
          
          # 编译每个架构
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            echo "=== Building for $abi ==="
            mkdir build-$abi && cd build-$abi
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE=${NDK}/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$abi \
              -DANDROID_PLATFORM=android-24 \
              -DCMAKE_BUILD_TYPE=Release \
              -DASMJIT_STATIC=ON \
              -DASMJIT_BUILD_TEST=OFF
            make -j$(nproc)
            
            # 创建架构目录并复制库
            mkdir -p ../release/lib/$abi
            find . -name "*.a" -exec cp {} ../release/lib/$abi/libasmjit.a \;
            cd ..
          done

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: asmjit-android-all
          path: release/
