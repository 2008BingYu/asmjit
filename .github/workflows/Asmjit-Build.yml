name: Build Asmjit for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build arm64-v8a
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          cd ..

      - name: Prepare package
        run: |
          mkdir -p release/lib/arm64-v8a
          mkdir -p release/include/asmjit
          cp build/src/asmjit/libasmjit.a release/lib/arm64-v8a/ 2>/dev/null || \
          cp build/asmjit/libasmjit.a release/lib/arm64-v8a/ 2>/dev/null || \
          find build -name "*.a" -exec cp {} release/lib/arm64-v8a/ \;
          cp -r asmjit release/include/

      - uses: actions/upload-artifact@v4
        with:
          name: asmjit-android-arm64
          path: release/
