name: Build Asmjit for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build armeabi-v7a
        run: |
          mkdir build-v7a && cd build-v7a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          # 确保能找到输出
          mkdir -p output
          find . -name "*.a" -exec cp {} output/ \;
          cd ..

      - name: Build arm64-v8a
        run: |
          mkdir build-v8a && cd build-v8a
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          mkdir -p output
          find . -name "*.a" -exec cp {} output/ \;
          cd ..

      - name: Build x86
        run: |
          mkdir build-x86 && cd build-x86
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86 \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          mkdir -p output
          find . -name "*.a" -exec cp {} output/ \;
          cd ..

      - name: Build x86_64
        run: |
          mkdir build-x86_64 && cd build-x86_64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          mkdir -p output
          find . -name "*.a" -exec cp {} output/ \;
          cd ..

      - name: Prepare release package
        run: |
          mkdir -p release/lib/armeabi-v7a
          mkdir -p release/lib/arm64-v8a
          mkdir -p release/lib/x86
          mkdir -p release/lib/x86_64
          mkdir -p release/include/asmjit
          
          # 从 output 目录复制
          cp build-v7a/output/*.a release/lib/armeabi-v7a/ 2>/dev/null || echo "v7a not found"
          cp build-v8a/output/*.a release/lib/arm64-v8a/ 2>/dev/null || echo "v8a not found"
          cp build-x86/output/*.a release/lib/x86/ 2>/dev/null || echo "x86 not found"
          cp build-x86_64/output/*.a release/lib/x86_64/ 2>/dev/null || echo "x86_64 not found"
          
          # 复制头文件
          cp -r asmjit release/include/

      - uses: actions/upload-artifact@v4
        with:
          name: asmjit-android-all
          path: release/
